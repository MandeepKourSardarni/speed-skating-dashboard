<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Ontario Speed Skating Dashboard</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container py-4">

  <h1 class="mb-4">
    Ontario Speed Skating Dashboard
  </h1>

  <div class="row mb-4">

    <div class="col-md-3">
      <select id="category" class="form-select">
        <option>Club Under 8</option>
        <option>Pre-Youth 9–10</option>
        <option>Youth 11–13</option>
        <option>Juniors 13–18</option>
        <option>Seniors 19–29</option>
        <option>Masters 30+</option>
      </select>
    </div>

    <div class="col-md-3">
      <select id="gender" class="form-select">
        <option>Male</option>
        <option>Female</option>
      </select>
    </div>

    <div class="col-md-3">
      <button class="btn btn-primary w-100" onclick="loadData()">
        Load Rankings
      </button>
    </div>

  </div>

  <table class="table table-striped">

    <thead>
      <tr>
        <th>Rank</th>
        <th>Name</th>
        <th>Club</th>
        <th>Best Time</th>
      </tr>
    </thead>

    <tbody id="tableBody"></tbody>

  </table>

  <div class="mt-5">
    <canvas id="chart"></canvas>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
